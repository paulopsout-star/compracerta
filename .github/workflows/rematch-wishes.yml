name: Rematch active wishes (every 5 min, 7h-19h BRT)

on:
  schedule:
    # 5 em 5 min das 10h às 22h UTC = 7h às 19h BRT
    - cron: "*/5 10-22 * * *"
  # Permite disparo manual pela aba Actions do GitHub
  workflow_dispatch:

jobs:
  rematch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call rematch endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sSf -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 90 \
            --retry 2 --retry-delay 5 \
            https://compracerta-seven.vercel.app/api/cron/rematch-active-wishes
